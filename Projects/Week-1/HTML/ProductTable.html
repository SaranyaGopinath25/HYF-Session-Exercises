<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Table</title>
</head>
<body>
    <div>

        <table>
            <thead>
                <tr>
                    <th>Product name</th>
                    <th>Price</th>
                    <th>Stock</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Product 1</td>
                    <td>$100</td>
                    <td>10</td>
                </tr>
                 <tr>
                    <td>Product 2</td>
                    <td>$200</td>
                    <td>20</td>
                </tr>
                 <tr>
                    <td>Product 3</td>
                    <td>$300</td>
                    <td>30</td>
                </tr>

            </tbody>
    
        </table>
    </div>
    
</body>
</html>
